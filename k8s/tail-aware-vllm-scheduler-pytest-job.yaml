apiVersion: batch/v1
kind: Job
metadata:
  name: tail-aware-vllm-scheduler-pytest
  namespace: ucsc-hsc
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 604800
  template:
    metadata:
      labels:
        app: tail-aware-vllm
        run: scheduler-pytest
    spec:
      restartPolicy: Never
      initContainers:
        - name: checkout
          image: alpine/git:2.45.2
          command:
            - sh
            - -lc
            - |
              set -eux
              mkdir -p /workspace/src
              REPO=/workspace/src/Tail-Aware-Scheduer
              if [ -d "$REPO/.git" ]; then
                git -C "$REPO" fetch origin main
                git -C "$REPO" checkout main
                git -C "$REPO" reset --hard origin/main
              else
                git clone https://github.com/labyrinth-ssr/Tail-Aware-Scheduer.git "$REPO"
              fi
              git -C "$REPO" submodule init
              git -C "$REPO/vllm" fetch --all
              git -C "$REPO" submodule update --recursive
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: exp
              mountPath: /workspace
      containers:
        - name: pytest
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/src/Tail-Aware-Scheduer/vllm
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          command:
            - bash
            - -lc
            - |
              set -euxo pipefail
              VLLM_USE_PRECOMPILED=1 pip install -e . --torch-backend=auto
              pip install -r requirements/test/cuda.in
              python -m pytest tests/v1/core/test_scheduler.py -k 'tail_aware' -v
          resources:
            requests:
              cpu: "4"
              memory: 12Gi
              ephemeral-storage: 10Gi
            limits:
              cpu: "4"
              memory: 12Gi
              ephemeral-storage: 20Gi
          volumeMounts:
            - name: exp
              mountPath: /workspace
      volumes:
        - name: exp
          persistentVolumeClaim:
            claimName: tail-aware-eos-pvc
