apiVersion: batch/v1
kind: Job
metadata:
  name: tail-aware-vllm-scheduler-pytest
  namespace: ucsc-hsc
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 604800
  template:
    metadata:
      labels:
        app: tail-aware-vllm
        run: scheduler-pytest
    spec:
      restartPolicy: Never
      initContainers:
        - name: checkout
          image: alpine/git:2.45.2
          command:
            - sh
            - -lc
            - |
              set -eux
              git clone --depth 1 --branch tail-aware-scheduler \
                https://github.com/labyrinth-ssr/vllm.git /src/vllm
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: src
              mountPath: /src
      containers:
        - name: pytest
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          workingDir: /src/vllm
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: SETUPTOOLS_SCM_PRETEND_VERSION
              value: "0.1.dev0"
          command:
            - bash
            - -lc
            - |
              set -euxo pipefail
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"
              VLLM_USE_PRECOMPILED=1 uv pip install --system -e .
              uv pip install --system pytest tblib
              python3 -m pytest tests/v1/core/test_scheduler.py \
                -k 'tail_aware' -v -s \
                2>&1 | tee /results/pytest-output.txt
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: src
              mountPath: /src
            - name: results
              mountPath: /results
      volumes:
        - name: src
          emptyDir: {}
        - name: results
          persistentVolumeClaim:
            claimName: tail-aware-eos-pvc
