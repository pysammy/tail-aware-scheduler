apiVersion: v1
kind: ConfigMap
metadata:
  name: tail-aware-eos-prompts-smoke
  namespace: ucsc-hsc
data:
  prompts.jsonl: |
    {"id":"short_translation_001","source":"short_translation","prompt":"Translate to French: The meeting starts at noon."}
    {"id":"short_translation_002","source":"short_translation","prompt":"Translate to Spanish: The server is busy, please try again later."}
    {"id":"short_qa_001","source":"short_qa","prompt":"Answer briefly: What is the capital of Japan?"}
    {"id":"short_qa_002","source":"short_qa","prompt":"Answer in one sentence: Why does ice float on water?"}
    {"id":"short_summary_001","source":"short_summary","prompt":"Summarize in one sentence: Large language models are neural networks trained on massive text corpora and adapted to follow instructions."}
    {"id":"short_rewrite_001","source":"short_rewrite","prompt":"Rewrite politely: Send me the report now."}
    {"id":"long_reasoning_001","source":"long_reasoning","prompt":"Solve step by step: A train leaves City A at 60 mph and another leaves City B at 45 mph. They are 315 miles apart and travel toward each other. When do they meet? Explain your reasoning."}
    {"id":"long_reasoning_002","source":"long_reasoning","prompt":"A store sells notebooks for $3 each and pens for $2 each. A student buys 17 items and spends $43. How many notebooks and pens did the student buy? Show the full reasoning."}
    {"id":"long_code_001","source":"long_code","prompt":"Write a Python function to merge overlapping intervals. Explain the algorithm, edge cases, and complexity, then provide tests."}
    {"id":"long_code_002","source":"long_code","prompt":"Implement a simple LRU cache in Python using a dictionary and a doubly linked list. Explain each operation and include a short usage example."}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: tail-aware-eos-qwen-smoke
  namespace: ucsc-hsc
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 604800
  template:
    metadata:
      labels:
        app: tail-aware-eos
        run: qwen-smoke
    spec:
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: PreferNoSchedule
      initContainers:
        - name: checkout
          image: alpine/git:2.45.2
          command:
            - sh
            - -lc
            - |
              set -eux
              mkdir -p /workspace/src
              if [ -d /workspace/src/Tail-Aware-Scheduer/.git ]; then
                git -C /workspace/src/Tail-Aware-Scheduer fetch origin main
                git -C /workspace/src/Tail-Aware-Scheduer checkout main
                git -C /workspace/src/Tail-Aware-Scheduer reset --hard origin/main
              else
                git clone https://github.com/labyrinth-ssr/Tail-Aware-Scheduer.git /workspace/src/Tail-Aware-Scheduer
              fi
          volumeMounts:
            - name: exp
              mountPath: /workspace
      containers:
        - name: eos-signal
          image: pytorch/pytorch:2.4.1-cuda12.4-cudnn9-runtime
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/src/Tail-Aware-Scheduer
          env:
            - name: HF_HOME
              value: /workspace/hf-cache
            - name: TRANSFORMERS_CACHE
              value: /workspace/hf-cache
            - name: TORCH_HOME
              value: /workspace/torch-cache
            - name: PYTHONUNBUFFERED
              value: "1"
          command:
            - bash
            - -lc
            - |
              set -euxo pipefail
              python -m pip install --upgrade pip
              python -m pip install -r requirements-offline.txt
              mkdir -p /workspace/tail-aware-results/eos_signal/qwen-smoke
              cp /inputs/prompts.jsonl /workspace/tail-aware-results/eos_signal/qwen-smoke/prompts.jsonl
              python experiments/eos_signal/collect_eos_traces.py \
                --model Qwen/Qwen2.5-7B-Instruct \
                --input /inputs/prompts.jsonl \
                --output /workspace/tail-aware-results/eos_signal/qwen-smoke/traces.jsonl \
                --max-new-tokens 256 \
                --temperature 0.0 \
                --dtype bfloat16
              python experiments/eos_signal/analyze_eos_traces.py \
                --input /workspace/tail-aware-results/eos_signal/qwen-smoke/traces.jsonl \
                --out-dir /workspace/tail-aware-results/eos_signal/qwen-smoke \
                --length-threshold 100 \
                --n-values 8,16,32 \
                --short-threshold-values 32,64,100,128 \
                --eos-thresh-values 0.001,0.005,0.01,0.02,0.05,0.1
          resources:
            requests:
              cpu: "4"
              memory: 32Gi
              ephemeral-storage: 20Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: 64Gi
              ephemeral-storage: 50Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: exp
              mountPath: /workspace
            - name: prompts
              mountPath: /inputs
              readOnly: true
      volumes:
        - name: exp
          persistentVolumeClaim:
            claimName: exp-pvc
        - name: prompts
          configMap:
            name: tail-aware-eos-prompts-smoke
